<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчеты | Твердый переплет</title>
    <link rel="icon" href="{{ url_for('static', filename='img/icon.png') }}" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reports.css') }}">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="sidebar-header"><h2><i class="fas fa-graduation-cap"></i><span>Твердый переплет</span></h2></div>
        <nav class="sidebar-nav"><ul>
            <li><a href="{{ url_for('index') }}"><i class="fas fa-tachometer-alt"></i>Главная</a></li>
            <li><a href="{{ url_for('books_page') }}"><i class="fas fa-book"></i>Каталог книг</a></li>
            <li><a href="{{ url_for('readers_page') }}"><i class="fas fa-users"></i>Читатели</a></li>
            <li><a href="{{ url_for('transactions_page') }}"><i class="fas fa-exchange-alt"></i>Выдачи/возвраты</a></li>
            <li><a href="{{ url_for('supplies_page') }}"><i class="fas fa-truck"></i>Поставки</a></li>
            <li><a href="{{ url_for('reports_page') }}" class="active"><i class="fas fa-chart-bar"></i>Отчеты</a></li>
            {% if current_user.role == 'Администратор' %}<li><a href="{{ url_for('settings_page') }}"><i class="fas fa-cog"></i>Настройки</a></li>{% endif %}
        </ul></nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Отчеты и аналитика</h1>
            <a href="{{ url_for('logout') }}" class="logout-btn" title="Выйти"><i class="fas fa-sign-out-alt"></i></a>
        </header>

        <div class="form-container">
            <h2 class="form-title">Параметры отчета</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="report-type">Тип отчета*</label>
                    <select id="report-type" class="form-control" required>
                        <option value="">Выберите тип отчета</option>
                        <option value="issued-books">По выданным книгам</option>
                        <option value="overdue">По просрочкам</option>
                        <option value="readers">По читателям</option>
                        <option value="book-popularity">По популярности книг</option>
                        <option value="penalties">По штрафным баллам</option>
                        <option value="write-off">По списанным книгам</option>
                        <option value="arrivals">По поступлениям книг</option>
                    </select>
                </div>
            </div>
            <div class="form-row" id="period-fields">
                <div class="form-group"><label for="start-date">Дата начала</label><input type="date" id="start-date" class="form-control"></div>
                <div class="form-group"><label for="end-date">Дата окончания</label><input type="date" id="end-date" class="form-control"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="generateReport()">Предпросмотр</button>
                <button class="btn btn-secondary" onclick="exportReport()">Выгрузить CSV</button>
                <button class="btn btn-secondary" onclick="resetReportForm()">Сбросить</button>
            </div>
        </div>

        <div class="report-results" id="report-results" style="display:none;">
            <h3 id="report-title">Предпросмотр отчета</h3>
            <div id="kpi-block"></div>
            <div id="report-content"></div>
        </div>
    </main>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/reports.js') }}"></script>
</body>
</html>
